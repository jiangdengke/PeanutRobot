name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build debug APK
        run: |
          for attempt in 1 2 3; do
            if bash ./gradlew :app:assembleDebug; then
              exit 0
            fi

            echo "Gradle build failed on attempt ${attempt}; retrying after cleanup..."
            rm -rf "${HOME}/.gradle/wrapper/dists/gradle-8.0-bin"
            sleep $((attempt * 15))
          done

          bash ./gradlew :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "PeanutRobot-${GITHUB_REF_NAME}-debug.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeanutRobot-${{ github.ref_name }}-debug-apk
          path: PeanutRobot-${{ github.ref_name }}-debug.apk

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apk_name="PeanutRobot-${GITHUB_REF_NAME}-debug.apk"
          notes_file="release-notes.md"
          git fetch --force origin "+refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

          tag_type="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(objecttype)')"
          tag_message=""
          if [ "${tag_type}" = "tag" ]; then
            tag_message="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')"
          fi

          if [ -z "${tag_message}" ]; then
            tag_message="- 本次发布未提供明确的版本更新说明"
          fi

          release_notes="${tag_message}"
          if [[ "${release_notes}" == 发布\ ${GITHUB_REF_NAME}* ]]; then
            release_notes="$(printf '%s\n' "${release_notes}" | awk 'NR == 1 { next } NR == 2 && $0 == "" { next } { print }')"
          fi

          if [ -z "${release_notes}" ]; then
            release_notes="- 本次发布未提供明确的版本更新说明"
          fi

          {
            echo "## 更新内容"
            echo
            printf '%s\n' "${release_notes}"
            echo
            echo "## 产物"
            echo "- ${apk_name}"
          } > "${notes_file}"

          release_args=(--title "${GITHUB_REF_NAME}" --notes-file "${notes_file}")
          if [[ "${GITHUB_REF_NAME}" =~ -(alpha|beta|rc)(\.|$) ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" "${release_args[@]}" --draft=false
            gh release upload "${GITHUB_REF_NAME}" "${apk_name}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${apk_name}" "${release_args[@]}"
          fi
