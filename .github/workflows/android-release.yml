name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build debug APK
        run: bash ./gradlew :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "PeanutRobot-${GITHUB_REF_NAME}-debug.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeanutRobot-${{ github.ref_name }}-debug-apk
          path: PeanutRobot-${{ github.ref_name }}-debug.apk

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apk_name="PeanutRobot-${GITHUB_REF_NAME}-debug.apk"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${apk_name}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${apk_name}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated debug APK build for ${GITHUB_REF_NAME}."
          fi
