buildscript {
    ext.kotlin_version = '1.9.0'  // 升级到与 CameraX 1.3.0 兼容的版本
    repositories {
        // GitHub Actions 优先使用官方源；镜像只作为 fallback，避免错误仓库抢先解析依赖。
        google {
            content {
                includeGroupByRegex("androidx\\..*")
                includeGroupByRegex("com\\.android.*")
                includeGroupByRegex("com\\.google\\.android.*")
                includeGroupByRegex("com\\.google\\.firebase.*")
                includeGroupByRegex("com\\.google\\.gms.*")
            }
        }
        mavenCentral()
        maven {
            url 'https://raw.github.com/saki4510t/libcommon/master/repository/'
            content {
                includeGroupByRegex("com\\.github\\.saki4510t.*")
                includeGroupByRegex("com\\.serenegiant.*")
            }
        }
        maven {
            url 'https://jitpack.io'
            content {
                includeGroupByRegex("com\\.github\\.CymChad.*")
                includeGroupByRegex("com\\.github\\.jiangdongguo.*")
                includeGroupByRegex("com\\.github\\.zhpanvip.*")
            }
        }
        maven {
            url 'https://maven.aliyun.com/repository/google'
            content {
                includeGroupByRegex("androidx\\..*")
                includeGroupByRegex("com\\.android.*")
                includeGroupByRegex("com\\.google\\.android.*")
                includeGroupByRegex("com\\.google\\.firebase.*")
                includeGroupByRegex("com\\.google\\.gms.*")
            }
        }
        maven { url 'https://maven.aliyun.com/repository/central' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/jcenter' }
        maven { url 'https://repository.liferay.com/nexus/content/repositories/public' }
        maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
//        maven {
//            url = uri("https://company/com/maven2")
//        }
//        mavenLocal()
//        jcenter()
//        google()
//        flatDir{
//            dirs('../aar/')
//        }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
        classpath 'com.github.dcendents:android-maven-gradle-plugin:2.1'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.5.20'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

